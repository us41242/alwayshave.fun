  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c1117; --surface: #161b22; --surface2: #1f2937;
      --border: #30363d; --text: #e6edf3; --text-muted: #8b949e;
      --text-subtle: #6e7681; --brand: #22c55e;
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }

    /* Nav */
    nav { position: sticky; top: 0; z-index: 200; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; background: rgba(12,17,23,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-weight: 900; font-size: 1.1rem; color: var(--brand); text-decoration: none; letter-spacing: -0.03em; }
    .nav-tagline { font-size: 0.78rem; color: var(--text-muted); }
    @media (max-width: 500px) { .nav-tagline { display: none; } }

    .wrap { max-width: 960px; margin: 0 auto; padding: 40px 20px 60px; }

    /* Breadcrumb */
    .breadcrumb { font-size: 0.78rem; color: var(--text-subtle); margin-bottom: 8px; }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--brand); }

    h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
    h1 span { color: var(--brand); }
    .page-sub { font-size: 0.92rem; color: var(--text-muted); margin-bottom: 36px; max-width: 540px; }

    /* State cards */
    .state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .state-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 28px 24px; text-decoration: none; color: inherit;
      transition: border-color 0.15s, transform 0.12s;
    }
    .state-card:hover { border-color: var(--text-subtle); transform: translateY(-2px); }
    .state-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .state-count { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 14px; }
    .state-avg { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; }
    .state-avg-dot { width: 8px; height: 8px; border-radius: 50%; }
    .state-loading { color: var(--text-subtle); font-size: 0.82rem; }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 24px 0 0; text-align: center; color: var(--text-subtle); font-size: 0.78rem; line-height: 1.7; margin-top: 48px; }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--brand); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">alwayshave.fun</a>
    <span class="nav-tagline">Outdoor conditions, updated every 30 min</span>
  </nav>

  <div class="wrap">
    <div class="breadcrumb"><a href="/">Home</a> / States</div>
    <h1>Trail conditions by <span>state</span></h1>
    <p class="page-sub">We track real-time conditions across 5 western states. Pick a state to see every trail.</p>

    <div class="state-grid" id="state-grid">
      <!-- Filled by JS -->
    </div>

    <footer>
      <p>alwayshave.fun — Real-time outdoor conditions.</p>
      <p>Data: Open-Meteo · AirNow · NASA FIRMS · Updated every 30 min</p>
    </footer>
  </div>

  <script>
    const STATE_META = {
      AZ: { name: 'Arizona',    icon: '🏜️', highlights: 'Grand Canyon, Havasupai, Sedona' },
      CA: { name: 'California', icon: '🌲', highlights: 'Yosemite, Big Sur, Mist Trail' },
      CO: { name: 'Colorado',   icon: '🏔️', highlights: 'Hanging Lake, Maroon Bells' },
      NV: { name: 'Nevada',     icon: '🌄', highlights: 'Valley of Fire, Red Rock, Great Basin' },
      UT: { name: 'Utah',       icon: '🪨', highlights: 'Zion, Bryce Canyon, Snow Canyon' },
    };

    function scoreColor(s) {
      if (s >= 85) return '#16a34a';
      if (s >= 70) return '#65a30d';
      if (s >= 50) return '#d97706';
      if (s >= 30) return '#ea580c';
      return '#dc2626';
    }

    async function loadStates() {
      const index = await fetch('/data/trails-index.json').then(r => r.json());
      const byState = {};
      for (const t of index) {
        if (!byState[t.state]) byState[t.state] = [];
        byState[t.state].push(t);
      }

      // Show cards immediately with trail counts
      const grid = document.getElementById('state-grid');
      const stateOrder = ['AZ','CA','CO','NV','UT'];
      grid.innerHTML = stateOrder.map(st => {
        const trails = byState[st] || [];
        const meta = STATE_META[st] || { name: st, icon: '⛰️', highlights: '' };
        return `
          <a class="state-card" href="/${st.toLowerCase()}" id="card-${st}">
            <div class="state-name">${meta.icon} ${meta.name}</div>
            <div class="state-count">${trails.length} trail${trails.length !== 1 ? 's' : ''} · ${meta.highlights}</div>
            <div class="state-avg state-loading" id="avg-${st}" style="animation:pulse 1.5s ease-in-out infinite">Loading scores…</div>
          </a>`;
      }).join('');

      // Load conditions for each trail and compute state averages
      const allConditions = {};
      const BATCH = 8;
      const allTrails = index;
      for (let i = 0; i < allTrails.length; i += BATCH) {
        await Promise.allSettled(allTrails.slice(i, i + BATCH).map(async trail => {
          try {
            const res = await fetch(`/data/conditions/${trail.slug}.json`);
            if (!res.ok) return;
            allConditions[trail.slug] = await res.json();
          } catch {}
        }));
      }

      // Update each state card with average score
      for (const st of stateOrder) {
        const trails = byState[st] || [];
        const scores = trails.map(t => allConditions[t.slug]?.score).filter(s => s != null);
        const el = document.getElementById(`avg-${st}`);
        if (scores.length === 0) {
          el.textContent = 'No scores available';
          el.style.animation = 'none';
          continue;
        }
        const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
        const great = scores.filter(s => s >= 85).length;
        const color = scoreColor(avg);
        el.style.animation = 'none';
        el.className = 'state-avg';
        el.innerHTML = `<span class="state-avg-dot" style="background:${color}"></span> Avg score: ${avg}/100 · ${great} great today`;
      }
    }

    loadStates();
  </script>
</body>
