name: Fetch Trail Conditions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-conditions
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Pull latest to avoid non-fast-forward push failures
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch scripts
        run: |
          python3 scripts/fetch_fires.py
          python3 scripts/fetch_conditions.py
          python3 scripts/condition_notifier.py
          python3 scripts/build_index.py
          python3 scripts/generate_sitemap.py
          python3 scripts/build_static.py
          python3 scripts/build_state_pages.py
          python3 scripts/build_articles_index.py
          python3 scripts/indexnow.py
        env:
          AIRNOW_KEY: ${{ secrets.AIRNOW_KEY }}
          WAQI_KEY: ${{ secrets.WAQI_KEY }}
          NASA_FIRMS_KEY: ${{ secrets.NASA_FIRMS_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ site/ generated/ articles/index.html
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: update trail conditions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase -X theirs origin main
          git push origin main

      - name: Purge Cloudflare cache
        env:
          CF_CACHE_PURGE_TOKEN: ${{ secrets.CF_CACHE_PURGE_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          [ -z "$CF_CACHE_PURGE_TOKEN" ] && echo "No purge token, skipping" && exit 0
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_CACHE_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | python3 -c "import json,sys; d=json.load(sys.stdin); print('Cache purge:', 'success' if d.get('success') else d.get('errors'))"
