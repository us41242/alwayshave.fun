name: Fetch Trail Conditions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-conditions
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch scripts
        run: |
          python3 scripts/fetch_fires.py
          python3 scripts/fetch_conditions.py
          python3 scripts/build_index.py
          python3 scripts/generate_sitemap.py
        env:
          AIRNOW_KEY: ${{ secrets.AIRNOW_KEY }}
          WAQI_KEY: ${{ secrets.WAQI_KEY }}
          NASA_FIRMS_KEY: ${{ secrets.NASA_FIRMS_KEY }}

      - name: Commit and push data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update trail conditions"
          file_pattern: "data/ site/"
          branch: main
