name: Fetch Trail Conditions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-conditions
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          python3 scripts/fetch_conditions.py
          python3 scripts/generate_sitemap.py
          git add data/ site/
          git diff --staged --quiet || git commit -m "data: update trail conditions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force
        env:
          AIRNOW_KEY: ${{ secrets.AIRNOW_KEY }}
          WAQI_KEY: ${{ secrets.WAQI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
